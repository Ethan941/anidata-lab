name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  lint-test:
    name: Lint and Tests (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: anidata-scraper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            anidata-scraper/requirements.txt
            anidata-scraper/requirements-dev.txt
            anidata-scraper/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check anidata_scraper tests

      - name: Run tests with coverage
        run: pytest --cov=anidata_scraper --cov-report=term-missing --cov-fail-under=80
