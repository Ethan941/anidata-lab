# ============================================
# Chargement auto des dashboards depuis le dossier
# ============================================

apiVersion: 1

providers:
  - name: "AniData Lab"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
